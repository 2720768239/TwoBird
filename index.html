<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TwoBird migrated to Next.js</title>
  <style>
    body {
      align-items: center;
      background: #f0f2f5;
      color: #2d3436;
      display: flex;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    main {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .08);
      max-width: 520px;
      padding: 28px;
    }
    h1 {
      color: #6c5ce7;
      font-size:24px;
      margin: 0 0 10px;
    }
    p {
      line-height: 1.7;
      margin: 0 0 10px;
    }
    code {
      background: #f8f9fa;
      border-radius: 4px;
      padding: 2px 5px;
    }
  </style>
</head>
<body>
  <main>
    <h1>TwoBird 已迁移到 Next.js</h1>
    <p>旧版单文件页面已经拆分为 Next.js App Router、React 组件、独立文章数据、全局样式和 API Route Handlers。</p>
    <p>请使用 <code>npm run dev</code> 启动应用，然后访问 <code>http://localhost:3000</code>。</p>
  </main>
</body>
</html>
